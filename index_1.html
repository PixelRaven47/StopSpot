<style>/* required styles */

.leaflet-pane,

}

.leaflet-container.leaflet-touch-zoom {
	-ms-touch-action: pan-x pan-y;
	touch-action: pan-x pan-y;
	}
.leaflet-container.leaflet-touch-drag {
	-ms-touch-action: pinch-zoom;
	/* Fallback for FF which doesn't support pinch-zoom */
	touch-action: none;
	touch-action: pinch-zoom;
}
.leaflet-container.leaflet-touch-drag.leaflet-touch-zoom {
	-ms-touch-action: none;
	touch-action: none;
}

}

<style>.leaflet-cluster-anim .leaflet-marker-icon, .leaflet-cluster-anim .leaflet-marker-shadow {

<style>
:root{
  --bg:#101418; --panel:#1a2027; --panel2:#222a33; --text:#eef2f6; --muted:#93a1b0;
  --toilet:#3d8bfd; --truckstop:#f28c1b; --restarea:#2fae67; --dumpstation:#9d6ff2;
  --star:#ffb703; --line:#2c3640;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;overflow:hidden}
header{background:var(--panel);border-bottom:1px solid var(--line);padding:10px 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;z-index:1001}
.logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:18px;letter-spacing:.2px}
.logo .badge{background:var(--truckstop);color:#fff;border-radius:8px;padding:2px 8px;font-size:13px}
.proto{font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:20px;padding:2px 9px}
.chips{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.chip{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:20px;padding:6px 12px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none;transition:all .15s}
.chip .dot{width:10px;height:10px;border-radius:50%}
.chip.off{opacity:.38}
.chip:hover{border-color:#4a5866}
select{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:6px 8px;font-size:13px}
.spacer{flex:1}
.btn{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:#4a5866}
.btn.primary{background:var(--truckstop);border-color:var(--truckstop);color:#fff;font-weight:600}
main{flex:1;display:flex;min-height:0;position:relative}
#map{flex:1;background:#0d232e}
.leaflet-container{background:#0d232e}
/* side panel */
#panel{width:400px;max-width:100%;background:var(--panel);border-left:1px solid var(--line);display:flex;flex-direction:column;min-height:0}
#panel .tabs{display:flex;border-bottom:1px solid var(--line)}
#panel .tabs button{flex:1;background:none;border:none;color:var(--muted);padding:11px;font-size:14px;cursor:pointer;border-bottom:2px solid transparent}
#panel .tabs button.active{color:var(--text);border-bottom-color:var(--truckstop);font-weight:600}
#listwrap{flex:1;overflow-y:auto}
.item{padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;gap:10px;align-items:flex-start}
.item:hover{background:var(--panel2)}
.item .ic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.item h4{font-size:14px;margin-bottom:2px}
.item .sub{font-size:12px;color:var(--muted)}
.item .stars{font-size:12px;color:var(--star)}
.item .dist{margin-left:auto;font-size:12px;color:var(--muted);flex-shrink:0;padding-top:2px}
/* detail */
#detail{flex:1;overflow-y:auto;display:none}
#detail .hero{padding:16px 16px 12px;border-bottom:1px solid var(--line)}
#detail .typechip{display:inline-flex;align-items:center;gap:6px;font-size:12px;border-radius:20px;padding:3px 10px;color:#fff;margin-bottom:8px}
#detail h2{font-size:20px;margin-bottom:4px}
#detail .region{color:var(--muted);font-size:13px;margin-bottom:10px}
.bigstars{font-size:22px;color:var(--star);letter-spacing:2px}
.ratecount{color:var(--muted);font-size:13px;margin-left:6px}
.facils{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.facil{font-size:12px;background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:3px 8px;color:var(--muted)}
.actions{display:flex;gap:8px;padding:12px 16px;border-bottom:1px solid var(--line)}
.actions .btn{flex:1;justify-content:center}
.rateblock{padding:14px 16px;border-bottom:1px solid var(--line)}
.rateblock h3, .comments h3{font-size:14px;margin-bottom:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.starpick{font-size:30px;cursor:pointer;user-select:none;color:#4a5866}
.starpick span.on{color:var(--star)}
textarea{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:9px;font-size:14px;margin-top:8px;resize:vertical;min-height:60px;font-family:inherit}
.comments{padding:14px 16px}
.comment{border-bottom:1px solid var(--line);padding:10px 0;font-size:14px}
.comment .who{font-size:12px;color:var(--muted);margin-bottom:3px;display:flex;gap:8px;align-items:center}
.comment .who .cstars{color:var(--star)}
.backbtn{background:none;border:none;color:var(--truckstop);font-size:14px;cursor:pointer;padding:12px 16px 0;text-align:left}
/* ad placeholder */
#ad{background:var(--panel2);border-top:1px solid var(--line);text-align:center;padding:7px;font-size:12px;color:var(--muted)}
/* map buttons */
.mapbtns{position:absolute;bottom:24px;left:12px;z-index:1000;display:flex;flex-direction:column;gap:8px}
.mapbtns .btn{box-shadow:0 2px 10px rgba(0,0,0,.4)}
/* toast */
#toast{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:#2e9e5b;color:#fff;border-radius:8px;padding:9px 18px;font-size:14px;z-index:2000;display:none;box-shadow:0 4px 14px rgba(0,0,0,.4)}
/* marker */
.pin{border-radius:50% 50% 50% 0;transform:rotate(-45deg);width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.85);box-shadow:0 2px 6px rgba(0,0,0,.5)}
.pin span{transform:rotate(45deg);font-size:13px}
.leaflet-popup-content-wrapper{background:var(--panel);color:var(--text);border-radius:10px}
.leaflet-popup-tip{background:var(--panel)}
.pop h4{margin-bottom:2px}
.pop .stars{color:var(--star);font-size:13px}
.pop button{margin-top:6px;background:var(--truckstop);border:none;color:#fff;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:13px}
/* add mode banner */
#addbanner{position:absolute;top:0;left:0;right:0;background:var(--truckstop);color:#fff;text-align:center;padding:8px;font-size:14px;z-index:1500;display:none}
#addform{position:absolute;inset:0;background:rgba(0,0,0,.6);z-index:1600;display:none;align-items:center;justify-content:center}
#addform .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;width:340px;max-width:92vw}
#addform h3{margin-bottom:12px}
#addform label{font-size:12px;color:var(--muted);display:block;margin:10px 0 4px}
#addform input,#addform select{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:8px;font-size:14px}
#addform .row{display:flex;gap:8px;margin-top:16px}
#addform .row .btn{flex:1;justify-content:center}
@media (max-width:760px){
  #panel{position:absolute;right:0;top:0;bottom:0;width:100%;display:none}
  #panel.open{display:flex}
  .chips{order:3;width:100%}
  #togglepanel{display:inline-flex}
}
#togglepanel{display:none}
@media (min-width:761px){ #togglepanel{display:none!important} }
</style>
</head>
<body>
<header>
  <div class="logo">🚛 StopSpot <span class="badge">NZ</span></div>
  <div class="proto">PROTOTYPE · sample + official council data · ratings not saved</div>
  <div class="chips" id="chips"></div>
  <select id="minrating">
    <option value="0">Any rating</option>
    <option value="3">3★ +</option>
    <option value="4">4★ +</option>
    <option value="4.5">4.5★ +</option>
  </select>
  <div class="spacer"></div>
  <button class="btn" id="addbtn">➕ Add a stop</button>
  <button class="btn" id="togglepanel">📋 List</button>
</header>
<main>
  <div id="map"></div>
  <div id="addbanner">Tap the map where the new stop is located · <a href="#" id="canceladd" style="color:#fff;font-weight:700">cancel</a></div>
  <div class="mapbtns">
    <button class="btn" id="nearme">📍 Near me</button>
  </div>
  <div id="toast"></div>
  <div id="addform"><div class="card">
    <h3>Add a stop</h3>
    <label>Name</label><input id="f_name" placeholder="e.g. Riverside rest area toilets">
    <label>Type</label><select id="f_type">
      <option value="toilet">🚻 Public toilet</option>
      <option value="truckstop">⛽ Truck stop</option>
      <option value="restarea">🌳 Rest area</option>
      <option value="dumpstation">🚐 Dump station</option>
    </select>
    <label>Town / area</label><input id="f_region" placeholder="e.g. Taihape">
    <div class="row"><button class="btn" id="f_cancel">Cancel</button><button class="btn primary" id="f_save">Save</button></div>
  </div></div>
  <div id="panel">
    <div class="tabs">
      <button id="tab_list" class="active">Nearby list</button>
      <button id="tab_detail" disabled style="display:none">Detail</button>
    </div>
    <div id="listwrap"></div>
    <div id="detail"></div>
    <div id="ad">Ad space — banner ads go here in the released app (AdMob / AdSense)</div>
  </div>
</main>

function avg(p){ return p.ratingCount ? p.ratingSum/p.ratingCount : 0; }
function starsTxt(v){ const f=Math.round(v); return "★".repeat(f)+"☆".repeat(5-f); }
function fmt(v){ return v ? v.toFixed(1) : "–"; }
function dist(a,b,c,d){ // km haversine
  const R=6371,toR=x=>x*Math.PI/180, dl=toR(c-a), dg=toR(d-b);
  const h=Math.sin(dl/2)**2+Math.cos(toR(a))*Math.cos(toR(c))*Math.sin(dg/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}
function esc(s){ return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function visible(p){ return activeTypes.has(p.type) && (p.ratingCount===0 || avg(p)>=minRating); }

function makeIcon(p){
  const m = TYPE_META[p.type];
  return L.divIcon({className:'', html:`<div class="pin" style="background:${m.hex}"><span>${m.icon}</span></div>`, iconSize:[28,28], iconAnchor:[14,28], popupAnchor:[0,-26]});
}
function popupHtml(p){
  return `<div class="pop"><h4>${esc(p.name)}</h4>
  <div class="stars">${starsTxt(avg(p))} <span style="color:#93a1b0">${fmt(avg(p))} (${p.ratingCount})</span></div>
  <div style="color:#93a1b0;font-size:12px">${esc(p.region)}</div>
  <button onclick="openDetail(${p.id})">View & rate</button>
  <a href="https://www.google.com/maps/search/?api=1&query=${p.lat}%2C${p.lng}" target="_blank" rel="noopener" style="display:inline-block;margin-top:6px;margin-left:6px;color:#f28c1b;font-size:13px">Google Maps ↗</a></div>`;
}
function refreshMarkers(){
  cluster.clearLayers();
  places.filter(visible).forEach(p=>{
    const mk = L.marker([p.lat,p.lng],{icon:makeIcon(p)}).bindPopup(popupHtml(p));
    markers[p.id]=mk; cluster.addLayer(mk);
  });
  renderList();
}

const chipsEl = document.getElementById('chips');
Object.entries(TYPE_META).forEach(([k,m])=>{
  const c=document.createElement('div'); c.className='chip';
  c.innerHTML=`<span class="dot" style="background:${m.hex}"></span>${m.icon} ${m.label}`;
  c.onclick=()=>{ activeTypes.has(k)?activeTypes.delete(k):activeTypes.add(k); c.classList.toggle('off'); refreshMarkers(); };
  chipsEl.appendChild(c);
});
document.getElementById('minrating').onchange = e=>{ minRating=parseFloat(e.target.value); refreshMarkers(); };

function renderList(){
  const wrap=document.getElementById('listwrap');
  let arr = places.filter(visible);
  if(userLoc) arr = arr.map(p=>({p,d:dist(userLoc[0],userLoc[1],p.lat,p.lng)})).sort((a,b)=>a.d-b.d).map(x=>(x.p._d=x.d,x.p));
  else arr = arr.slice().sort((a,b)=>avg(b)-avg(a));
  wrap.innerHTML = arr.slice(0,80).map(p=>{
    const m=TYPE_META[p.type];
    return `<div class="item" onclick="openDetail(${p.id})">
      <div class="ic" style="background:${m.hex}22;border:1px solid ${m.hex}55">${m.icon}</div>
      <div><h4>${esc(p.name)}</h4>
      <div class="stars">${starsTxt(avg(p))} <span style="color:#93a1b0">${fmt(avg(p))} · ${p.ratingCount} ratings</span></div>
      <div class="sub">${esc(p.region)}</div></div>
      ${p._d!=null?`<div class="dist">${p._d<1?Math.round(p._d*1000)+' m':p._d.toFixed(0)+' km'}</div>`:''}
    </div>`;
  }).join('') || '<div style="padding:20px;color:#93a1b0">Nothing matches the current filters.</div>';
}

/* ------- detail ------- */
window.openDetail = function(id){
  const p = places.find(x=>x.id===id); if(!p) return;
  currentDetail=p; let myStars=0;
  const d=document.getElementById('detail'), m=TYPE_META[p.type];
  document.getElementById('listwrap').style.display='none';
  d.style.display='block';
  document.getElementById('panel').classList.add('open');
  d.innerHTML = `
    <button class="backbtn" onclick="closeDetail()">← Back to list</button>
    <div class="hero">
      <span class="typechip" style="background:${m.hex}">${m.icon} ${m.label.replace(/s$/,'')}</span>
      <h2>${esc(p.name)}</h2>
      <div class="region">${esc(p.region)}</div>
      <span class="bigstars">${starsTxt(avg(p))}</span><span class="ratecount">${fmt(avg(p))} · ${p.ratingCount} ratings</span>
      <div class="facils">${p.facilities.map(f=>`<span class="facil">${esc(f)}</span>`).join('')}</div>
    </div>
    <div class="actions">
      <a class="btn primary" target="_blank" rel="noopener" href="https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}">🧭 Directions</a>
      <a class="btn" target="_blank" rel="noopener" href="https://www.google.com/maps/search/?api=1&query=${p.lat}%2C${p.lng}">📍 Google Maps</a>
      <button class="btn" onclick="map.setView([${p.lat},${p.lng}],15)">🗺️ Map</button>
    </div>
    <div class="rateblock">
      <h3>Rate this stop</h3>
      <div class="starpick" id="starpick">${[1,2,3,4,5].map(i=>`<span data-i="${i}">★</span>`).join('')}</div>
      <textarea id="ctext" placeholder="Leave a comment (optional) — e.g. clean, easy truck access, avoid at night…"></textarea>
      <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
        <button class="btn primary" id="submitrate">Submit</button>
        <span style="font-size:12px;color:#93a1b0">Prototype: saved for this session only</span>
      </div>
    </div>
    <div class="comments"><h3>Comments (${p.comments.length})</h3>
      <div id="clist">${p.comments.map(c=>commentHtml(c)).join('') || '<div style="color:#93a1b0;font-size:13px">No comments yet — be the first.</div>'}</div>
    </div>`;
  d.querySelectorAll('#starpick span').forEach(s=>{
    s.onclick=()=>{ myStars=+s.dataset.i;
      d.querySelectorAll('#starpick span').forEach(x=>x.classList.toggle('on',+x.dataset.i<=myStars)); };
  });
  d.querySelector('#submitrate').onclick=()=>{
    if(!myStars){ toast('Tap a star rating first','#c0392b'); return; }
    const text=d.querySelector('#ctext').value.trim();
    p.ratingSum+=myStars; p.ratingCount++;
    if(text) p.comments.unshift({who:'You',stars:myStars,text,when:'just now'});
    toast('Thanks! Rating added ✔');
    refreshMarkers(); openDetail(p.id);
  };
  map.setView([p.lat,p.lng], Math.max(map.getZoom(),11));
};
function commentHtml(c){
  return `<div class="comment"><div class="who"><strong>${esc(c.who)}</strong><span class="cstars">${starsTxt(c.stars)}</span><span>· ${esc(c.when)}</span></div>${esc(c.text)}</div>`;
}
window.closeDetail = function(){
  document.getElementById('detail').style.display='none';
  document.getElementById('listwrap').style.display='block';
  currentDetail=null;
};

/* ------- near me ------- */
document.getElementById('nearme').onclick=()=>{
  if(!navigator.geolocation){ toast('Geolocation not available','#c0392b'); return; }
  toast('Locating…','#3d8bfd');
  navigator.geolocation.getCurrentPosition(pos=>{
    userLoc=[pos.coords.latitude,pos.coords.longitude];
    L.circleMarker(userLoc,{radius:8,color:'#fff',fillColor:'#3d8bfd',fillOpacity:1}).addTo(map).bindPopup('You are here');
    map.setView(userLoc,12); renderList(); toast('Sorted by distance ✔');
  },()=>toast('Could not get your location','#c0392b'),{timeout:8000});
};

/* ------- add a stop ------- */
document.getElementById('addbtn').onclick=()=>{ addMode=true; document.getElementById('addbanner').style.display='block'; };
document.getElementById('canceladd').onclick=(e)=>{ e.preventDefault(); addMode=false; document.getElementById('addbanner').style.display='none'; };
map.on('click',e=>{
  if(!addMode) return;
  pendingLatLng=e.latlng; addMode=false;
  document.getElementById('addbanner').style.display='none';
  document.getElementById('addform').style.display='flex';
});
document.getElementById('f_cancel').onclick=()=>{ document.getElementById('addform').style.display='none'; };
document.getElementById('f_save').onclick=()=>{
  const name=document.getElementById('f_name').value.trim();
  if(!name){ toast('Give it a name','#c0392b'); return; }
  const p={ id:places.length, name, type:document.getElementById('f_type').value,
    lat:pendingLatLng.lat, lng:pendingLatLng.lng,
    region:document.getElementById('f_region').value.trim()||'Added by you',
    facilities:['Community added'], ratingSum:0, ratingCount:0, comments:[] };
  places.push(p);
  document.getElementById('addform').style.display='none';
  document.getElementById('f_name').value=''; document.getElementById('f_region').value='';
  refreshMarkers(); toast('Stop added ✔ (session only in prototype)'); openDetail(p.id);
};

/* ------- misc ------- */
function toast(msg,color){ const t=document.getElementById('toast'); t.textContent=msg; t.style.background=color||'#2e9e5b'; t.style.display='block'; clearTimeout(t._h); t._h=setTimeout(()=>t.style.display='none',2600); }
document.getElementById('togglepanel').onclick=()=>{ document.getElementById('panel').classList.toggle('open'); };
document.getElementById('tab_list').onclick=()=>closeDetail();

refreshMarkers();
</script>
</body>
</html>
